<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng FINAL</title>

  <style>
    body { font-family: Arial; }

    .container { display: flex; gap: 20px; }

    .left { flex: 0.7; }

    .right {
      flex: 1.3;
      min-width: 350px;
      border: 1px solid #ccc;
      padding: 12px;
      background: #fafafa;
    }

    #map { height: 500px; margin-top: 10px; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 6px;
      margin: 4px 0;
    }

    button {
      padding: 6px 12px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
    }

    #info { margin-top: 10px; font-weight: bold; }

    #suggestion {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .left, .right { width: 100%; }
      #map { height: 400px; }
    }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng FINAL</h3>

<div class="container">

  <div class="left">
    <div id="inputs"></div>

    <button onclick="addPoint()">+ Thêm điểm</button>
    <button onclick="buildRoute()">Vẽ route</button>

    <div id="info">Tổng quãng đường: 0 km</div>
  </div>

  <div class="right">
    <h4>📌 Gợi ý cung đường:</h4>
    <div id="suggestion">Chưa có dữ liệu</div>
  </div>

</div>

<div id="map"></div>

<!-- HERE -->
<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
<link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />

<script>

const API_KEY = "YOUR_API_KEY";

// ===== MAP (FIX TRẮNG) =====
const platform = new H.service.Platform({ apikey: API_KEY });

const layers = platform.createDefaultLayers({
  lg: 'vi'
});

const map = new H.Map(
  document.getElementById('map'),
  layers.raster.normal.map,
  {
    zoom: 12,
    center: { lat: 21.0285, lng: 105.8542 }
  }
);

window.addEventListener('resize', () => map.getViewPort().resize());
setTimeout(() => map.getViewPort().resize(), 100);

new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
H.ui.UI.createDefault(map, layers);

// ===== STATE =====
let markers = [];
let routeGroup = null;
let inputCount = 0;

// ===== INPUT =====
function addPoint() {
  inputCount++;

  const wrapper = document.createElement("div");
  wrapper.className = "input-row";

  const input = document.createElement("input");
  input.placeholder = "Điểm " + inputCount;
  input.className = "point-input";

  wrapper.appendChild(input);

  if (inputCount > 2) {
    const removeBtn = document.createElement("button");
    removeBtn.innerText = "❌";
    removeBtn.onclick = () => wrapper.remove();
    wrapper.appendChild(removeBtn);
  }

  document.getElementById("inputs").appendChild(wrapper);
}

addPoint(); addPoint(); addPoint();

// ===== GEOCODE =====
async function geocode(addr) {
  const res = await fetch(
    `https://geocode.search.hereapi.com/v1/geocode?q=${encodeURIComponent(addr)}&apiKey=${API_KEY}`
  );
  const data = await res.json();
  if (!data.items.length) return null;
  return [data.items[0].position.lat, data.items[0].position.lng];
}

// ===== DISTANCE =====
function distance(a, b) {
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// ===== OPTIMIZE =====
function optimizeRoute(points, addresses) {
  let orderedPoints = [points[0]];
  let orderedAddresses = [addresses[0]];
  let remainP = points.slice(1);
  let remainA = addresses.slice(1);

  while (remainP.length) {
    let last = orderedPoints.at(-1);
    let idx = 0, min = distance(last, remainP[0]);

    for (let i=1;i<remainP.length;i++) {
      let d = distance(last, remainP[i]);
      if (d < min) { min = d; idx = i; }
    }

    orderedPoints.push(remainP[idx]);
    orderedAddresses.push(remainA[idx]);

    remainP.splice(idx,1);
    remainA.splice(idx,1);
  }

  return { orderedPoints, orderedAddresses };
}

// ===== ICON SỐ =====
function createNumberIcon(number) {
  return new H.map.DomIcon(`
    <div style="
      background:#ff4d4f;
      color:white;
      border-radius:50%;
      width:32px;
      height:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
    ">
      ${number}
    </div>
  `);
}

// ===== ROUTE (FIX CHUẨN) =====
async function drawRoute(points) {

  if (routeGroup) map.removeObject(routeGroup);

  const origin = `${points[0][0]},${points[0][1]}`;
  const destination = `${points.at(-1)[0]},${points.at(-1)[1]}`;

  const via = points.slice(1,-1)
    .map(p => `&via=${p[0]},${p[1]}`)
    .join("");

  const url = `https://router.hereapi.com/v8/routes?transportMode=car&origin=${origin}&destination=${destination}${via}&return=polyline,summary&routingMode=fast&apiKey=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.routes) {
    console.log(data);
    alert("Lỗi route HERE");
    return;
  }

  routeGroup = new H.map.Group();

  let totalDistance = 0;

  data.routes[0].sections.forEach(section => {

    const line = H.geo.LineString.fromFlexiblePolyline(section.polyline);

    const polyline = new H.map.Polyline(line, {
      style: { strokeColor: 'blue', lineWidth: 5 }
    });

    routeGroup.addObject(polyline);

    totalDistance += section.summary.length;
  });

  map.addObject(routeGroup);

  map.getViewModel().setLookAtData({
    bounds: routeGroup.getBoundingBox()
  });

  document.getElementById("info").innerText =
    "Tổng quãng đường: " + (totalDistance / 1000).toFixed(2) + " km";
}

// ===== BUILD =====
async function buildRoute() {

  let inputs = document.querySelectorAll(".point-input");

  let addresses = [];
  inputs.forEach(i => { if (i.value) addresses.push(i.value); });

  if (addresses.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  markers.forEach(m => map.removeObject(m));
  markers = [];

  let points = [];
  for (let a of addresses) {
    let p = await geocode(a);
    if (!p) return alert("Không tìm thấy: " + a);
    points.push(p);
  }

  const { orderedPoints, orderedAddresses } =
    optimizeRoute(points, addresses);

  // ===== GỢI Ý =====
  let html = "<ol>";
  orderedAddresses.forEach(a => html += `<li>${a}</li>`);
  html += "</ol>";

  // ===== LINK GOOGLE =====
  const gmapUrl = "https://www.google.com/maps/dir/" +
    orderedPoints.map(p => `${p[0]},${p[1]}`).join("/");

  html += `
    <a href="${gmapUrl}" target="_blank" style="
      display:inline-block;
      margin-top:10px;
      background:#4285F4;
      color:white;
      padding:8px 12px;
      border-radius:6px;
      text-decoration:none;
      font-weight:bold;
    ">
      🗺️ Mở Google Maps
    </a>
  `;

  document.getElementById("suggestion").innerHTML = html;

  // ===== MARKER =====
  orderedPoints.forEach((p, i) => {

    const icon = createNumberIcon(i+1);

    const marker = new H.map.DomMarker(
      { lat: p[0], lng: p[1] },
      { icon }
    );

    map.addObject(marker);
    markers.push(marker);
  });

  await drawRoute(orderedPoints);
}

</script>

</body>
</html>
