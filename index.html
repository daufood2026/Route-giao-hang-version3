<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng by_turtle v3 </title>

  <style>
    body { font-family: Arial; }

    .container {
      display: flex;
      gap: 20px;
    }

    .left { flex: 0.7; }

    .right {
      flex: 1.3;
      min-width: 350px;
      border: 1px solid #ccc;
      padding: 12px;
      background: #fafafa;
    }

    #map { height: 500px; margin-top: 10px; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    input {
      flex: 1;
      padding: 6px;
      margin: 4px 0;
    }

    button {
      padding: 6px 12px;
      margin: 5px 5px 5px 0;
      cursor: pointer;
    }

    #info { margin-top: 10px; font-weight: bold; }

    #suggestion {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .left, .right { width: 100%; }
      #map { height: 400px; }
    }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng by_turtle v3 </h3>

<div class="container">

  <div class="left">
    <div id="inputs"></div>

    <button onclick="addPoint()">+ Thêm điểm</button>
    <button onclick="buildRoute()">Vẽ route</button>

    <div id="info">Tổng quãng đường (tương đối): 0 km</div>
  </div>

  <div class="right">
    <h4>📌 Gợi ý cung đường:</h4>
    <div id="suggestion">Chưa có dữ liệu</div>
  </div>

</div>

<div id="map"></div>

<!-- HERE MAP (FIX ĐỦ SCRIPT) -->
<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
<link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />

<script>

// ===== CONFIG =====
const API_KEY = "YOUR_API_KEY";

// ===== MAP =====
const platform = new H.service.Platform({ apikey: API_KEY });
const defaultLayers = platform.createDefaultLayers();

var map = new H.Map(
  document.getElementById('map'),
  defaultLayers.vector.normal.map,
  {
    zoom: 12,
    center: { lat: 21.0285, lng: 105.8542 }
  }
);

// FIX: enable interaction nhưng KHÔNG crash
const behavior = new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
H.ui.UI.createDefault(map, defaultLayers);

// ===== STATE =====
let markers = [];
let routeLine;
let inputCount = 0;

// ===== ADD INPUT (GIỮ NGUYÊN 100%) =====
function addPoint() {
  inputCount++;

  const wrapper = document.createElement("div");
  wrapper.className = "input-row";

  const input = document.createElement("input");
  input.placeholder = "Điểm " + inputCount;
  input.className = "point-input";

  wrapper.appendChild(input);

  if (inputCount > 2) {
    const removeBtn = document.createElement("button");
    removeBtn.innerText = "❌";

    removeBtn.onclick = () => {
      wrapper.remove();
    };

    wrapper.appendChild(removeBtn);
  }

  document.getElementById("inputs").appendChild(wrapper);
}

// GIỮ NGUYÊN INIT
addPoint(); addPoint(); addPoint();

// ===== GEOCODE (HERE) =====
async function geocode(address) {
  const res = await fetch(
    `https://geocode.search.hereapi.com/v1/geocode?q=${encodeURIComponent(address)}&apiKey=${API_KEY}`
  );
  const data = await res.json();

  if (!data.items.length) return null;

  return [data.items[0].position.lat, data.items[0].position.lng];
}

// ===== DISTANCE (GIỮ NGUYÊN) =====
function distance(a, b) {
  return Math.sqrt(
    (a[0]-b[0])**2 + (a[1]-b[1])**2
  );
}

// ===== OPTIMIZE (GIỮ NGUYÊN) =====
function optimizeRoute(points, addresses) {

  let orderedPoints = [points[0]];
  let orderedAddresses = [addresses[0]];

  let remainingPoints = points.slice(1);
  let remainingAddr = addresses.slice(1);

  while (remainingPoints.length > 0) {
    let last = orderedPoints[orderedPoints.length - 1];

    let minIndex = 0;
    let minDist = distance(last, remainingPoints[0]);

    for (let i = 1; i < remainingPoints.length; i++) {
      let d = distance(last, remainingPoints[i]);
      if (d < minDist) {
        minDist = d;
        minIndex = i;
      }
    }

    orderedPoints.push(remainingPoints[minIndex]);
    orderedAddresses.push(remainingAddr[minIndex]);

    remainingPoints.splice(minIndex, 1);
    remainingAddr.splice(minIndex, 1);
  }

  return { orderedPoints, orderedAddresses };
}

// ===== ROUTE (HERE) =====
async function drawRoute(points) {

  if (routeLine) map.removeObject(routeLine);

  const origin = `${points[0][0]},${points[0][1]}`;
  const destination = `${points[points.length - 1][0]},${points[points.length - 1][1]}`;

  let via = "";
  if (points.length > 2) {
    via = points.slice(1, -1)
      .map(p => `&via=${p[0]},${p[1]}`)
      .join("");
  }

  const url = `https://router.hereapi.com/v8/routes?transportMode=car&origin=${origin}&destination=${destination}${via}&return=polyline,summary&apiKey=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  const section = data.routes[0].sections[0];

  const linestring = H.geo.LineString.fromFlexiblePolyline(section.polyline);

  routeLine = new H.map.Polyline(linestring, {
    style: { strokeColor: 'blue', lineWidth: 5 }
  });

  map.addObject(routeLine);
  map.getViewModel().setLookAtData({ bounds: routeLine.getBoundingBox() });

  document.getElementById("info").innerText =
    "Tổng quãng đường (tương đối): " + (section.summary.length / 1000).toFixed(2) + " km";
}

// ===== BUILD (GIỮ NGUYÊN LOGIC) =====
async function buildRoute() {

  const inputs = document.querySelectorAll(".point-input");

  let addresses = [];
  inputs.forEach(i => {
    if (i.value) addresses.push(i.value);
  });

  if (addresses.length < 2) {
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  markers.forEach(m => map.removeObject(m));
  markers = [];

  let points = [];

  for (let addr of addresses) {
    const p = await geocode(addr);
    if (!p) {
      alert("Không tìm thấy: " + addr);
      return;
    }
    points.push(p);
  }

  const { orderedPoints, orderedAddresses } =
    optimizeRoute(points, addresses);

  let html = "<ol>";
  orderedAddresses.forEach(addr => {
    html += `<li>${addr}</li>`;
  });
  html += "</ol>";

  document.getElementById("suggestion").innerHTML = html;

  orderedPoints.forEach((p) => {
    const marker = new H.map.Marker({ lat: p[0], lng: p[1] });
    map.addObject(marker);
    markers.push(marker);
  });

  await drawRoute(orderedPoints);
}

</script>

</body>
</html>
