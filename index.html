<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng FINAL - Stable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:20px; }
    .container { display:flex; gap:20px; }
    .left { flex:0.7; }
    .right { flex:1.3; border:1px solid #ccc; padding:12px; background:#fafafa; }

    #map { height:500px; margin-top:10px; background:#eee; }

    .input-row { display:flex; gap:5px; }
    input { flex:1; padding:6px; }
    button { padding:6px 12px; margin:5px 5px 5px 0; cursor:pointer; }

    #info { margin-top:10px; font-weight:bold; }
  </style>
</head>

<body>

<h3>🚚 Route giao hàng v3</h3>

<div class="container">

  <div class="left">
    <div id="inputs"></div>

    <button onclick="addPoint()">+ Thêm điểm</button>
    <button onclick="buildRoute()">Vẽ route</button>

    <div id="info">Tổng quãng đường: 0 km</div>
  </div>

  <div class="right">
    <h4>📌 Gợi ý:</h4>
    <div id="suggestion">Chưa có</div>
  </div>

</div>

<div id="map"></div>

<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
<link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css"/>

<script>

// ===== API =====
const API_KEY = "VkhQNy-v_IW-P28JVNho3NYF4dasL4qGr9N-61082nY";

// ===== MAP =====
const platform = new H.service.Platform({ apikey: API_KEY });
const layers = platform.createDefaultLayers();

const map = new H.Map(
  document.getElementById('map'),
  layers.raster.normal.map, // 🔥 fix trắng map
  {
    zoom: 12,
    center: { lat: 21.0285, lng: 105.8542 }
  }
);

window.addEventListener('resize', () => map.getViewPort().resize());
new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
H.ui.UI.createDefault(map, layers);

// ===== INPUT =====
let inputCount = 0;

function addPoint() {
  inputCount++;

  const row = document.createElement("div");
  row.className = "input-row";

  const input = document.createElement("input");
  input.placeholder = "Điểm " + inputCount;
  input.className = "point-input";

  row.appendChild(input);

  if (inputCount > 2) {
    const btn = document.createElement("button");
    btn.innerText = "❌";
    btn.onclick = () => row.remove();
    row.appendChild(btn);
  }

  document.getElementById("inputs").appendChild(row);
}

addPoint(); addPoint(); addPoint();

// ===== GEOCODE (FIX CHUẨN VN) =====
async function geocode(addr) {

  const query = addr.includes("Hà Nội") ? addr : addr + ", Hà Nội";

  const url = `https://geocode.search.hereapi.com/v1/geocode?q=${encodeURIComponent(query)}
    &in=countryCode:VNM
    &at=21.0285,105.8542
    &limit=1
    &apiKey=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.items.length) return null;

  return [
    data.items[0].position.lat,
    data.items[0].position.lng
  ];
}

// ===== DISTANCE =====
function distance(a,b){
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// ===== OPTIMIZE =====
function optimizeRoute(points, addresses){

  let op=[points[0]];
  let oa=[addresses[0]];

  let rp=points.slice(1);
  let ra=addresses.slice(1);

  while(rp.length){

    let last=op.at(-1);
    let idx=0;
    let min=distance(last,rp[0]);

    for(let i=1;i<rp.length;i++){
      let d=distance(last,rp[i]);
      if(d<min){min=d;idx=i;}
    }

    op.push(rp[idx]);
    oa.push(ra[idx]);

    rp.splice(idx,1);
    ra.splice(idx,1);
  }

  return {orderedPoints:op, orderedAddresses:oa};
}

// ===== MARKER =====
let markers=[];
function addMarker(p,i){
  const icon = new H.map.DomIcon(`
    <div style="background:red;color:white;border-radius:50%;width:30px;height:30px;
    display:flex;align-items:center;justify-content:center;font-weight:bold">
    ${i}
    </div>`);

  const m = new H.map.DomMarker({lat:p[0], lng:p[1]}, {icon});
  map.addObject(m);
  markers.push(m);
}

// ===== ROUTE =====
let routeGroup=null;

async function drawRoute(points){

  if(routeGroup) map.removeObject(routeGroup);
  routeGroup = new H.map.Group();

  const origin = `${points[0][0]},${points[0][1]}`;
  const destination = `${points.at(-1)[0]},${points.at(-1)[1]}`;

  const via = points.slice(1,-1)
    .map(p=>`&via=${p[0]},${p[1]}`)
    .join("");

  const url = `https://router.hereapi.com/v8/routes?transportMode=car
    &origin=${origin}
    &destination=${destination}
    ${via}
    &return=polyline,summary
    &apiKey=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  let total=0;

  data.routes[0].sections.forEach(s=>{
    const line = H.geo.LineString.fromFlexiblePolyline(s.polyline);
    const poly = new H.map.Polyline(line,{style:{strokeColor:'blue',lineWidth:5}});
    routeGroup.addObject(poly);
    total += s.summary.length;
  });

  map.addObject(routeGroup);
  map.getViewModel().setLookAtData({bounds: routeGroup.getBoundingBox()});

  document.getElementById("info").innerText =
    "Tổng quãng đường: " + (total/1000).toFixed(2) + " km";
}

// ===== BUILD =====
async function buildRoute(){

  markers.forEach(m=>map.removeObject(m));
  markers=[];

  const inputs=document.querySelectorAll(".point-input");

  let addresses=[];
  inputs.forEach(i=>{
    if(i.value) addresses.push(i.value);
  });

  if(addresses.length<2){
    alert("Nhập ít nhất 2 điểm");
    return;
  }

  let points=[];

  for(let a of addresses){
    const p = await geocode(a);
    if(!p){
      alert("Không tìm thấy: "+a);
      return;
    }
    points.push(p);
  }

  const {orderedPoints, orderedAddresses} =
    optimizeRoute(points, addresses);

  // suggestion
  let html="<ol>";
  orderedAddresses.forEach(a=>html+=`<li>${a}</li>`);
  html+="</ol>";

  // google link
  const gmap="https://www.google.com/maps/dir/" +
    orderedPoints.map(p=>`${p[0]},${p[1]}`).join("/");

  html+=`<a href="${gmap}" target="_blank">Mở Google Maps</a>`;

  document.getElementById("suggestion").innerHTML=html;

  // marker
  orderedPoints.forEach((p,i)=>addMarker(p,i+1));

  await drawRoute(orderedPoints);
}

</script>

</body>
</html>
