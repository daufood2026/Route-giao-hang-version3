<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng v3.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:'Segoe UI';
      margin:20px;
      background:#f5f7fb;
      color:#333;
    }

    .watermark{
      position:fixed;
      top:10px;
      right:15px;
      font-size:11px;
      color:rgba(0,0,0,0.35);
      background:rgba(255,255,255,0.6);
      padding:4px 10px;
      border-radius:8px;
      z-index:9999;
      pointer-events:none;
      backdrop-filter: blur(4px);
    }

    h3{
      margin-bottom:15px;
      font-weight:600;
    }

    .container{
      display:flex;
      gap:20px;
    }

    .left,.right{
      background:white;
      border-radius:12px;
      padding:15px;
      box-shadow:0 6px 20px rgba(0,0,0,0.05);
    }

    .left{flex:0.8;}
    .right{flex:1.2;}

    #map{
      height:500px;
      margin-top:15px;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 6px 20px rgba(0,0,0,0.08);
    }

    .input-row{
      display:flex;
      gap:6px;
      margin-bottom:8px;
    }

    input{
      flex:1;
      padding:10px 12px;
      border:1px solid #e0e0e0;
      border-radius:8px;
      outline:none;
      transition:0.2s;
    }

    input:focus{
      border-color:#00AB9F;
      box-shadow:0 0 0 2px rgba(0,171,159,0.1);
    }

    button{
      padding:9px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:500;
    }

    .btn-add{
      background:#00AB9F;
      color:white;
    }

    .btn-main{
      background:#007bff;
      color:white;
    }

    .btn-del{
      background:#dc3545;
      color:white;
    }

    #info{
      margin-top:10px;
      font-size:13px;
      color:#666;
    }

    #suggestion{
      font-size:14px;
      line-height:1.6;
    }
  </style>
</head>

<body>

<div class="watermark">by Turtle - v3.0</div>

<h3>🚚 Delivery Route - Giợi ý lộ trình di chuyển/ giao hàng</h3>

<div class="container">

  <div class="left">
    <div id="inputs"></div>

    <button class="btn-add" onclick="addPoint()">+ Thêm điểm</button>
    <button class="btn-main" onclick="buildRoute()">🚀 Vẽ route</button>

    <div id="info">Tổng quãng đường: 0 km</div>
  </div>

  <div class="right">
    <h4>📌 Lộ trình gợi ý</h4>
    <div id="suggestion">Chưa có dữ liệu</div>
  </div>

</div>

<div id="map"></div>

<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
<link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css"/>

<script>

// ===== API =====
const API_KEY="VkhQNy-v_IW-P28JVNho3NYF4dasL4qGr9N-61082nY";

// ===== MAP =====
const platform=new H.service.Platform({apikey:API_KEY});
const layers=platform.createDefaultLayers();

const map=new H.Map(
  document.getElementById("map"),
  layers.vector.normal.map,
  {zoom:12,center:{lat:21.0285,lng:105.8542}}
);

window.addEventListener("resize",()=>map.getViewPort().resize());
new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
H.ui.UI.createDefault(map,layers);

// ===== INPUT =====
let count=0;

function addPoint(){
  count++;

  let label=count===1
    ?"Điểm khởi hành / Kho đóng hàng"
    :`Điểm đến ${count-1}`;

  const div=document.createElement("div");
  div.className="input-row";

  div.innerHTML=`
    <input class="point-input" placeholder="${label}">
    ${count>2?'<button class="btn-del" onclick="this.parentElement.remove()">❌</button>':''}
  `;

  document.getElementById("inputs").appendChild(div);
}

addPoint();addPoint();addPoint();

// ===== GEOCODE =====
async function geocode(addr){
  try{
    const res=await fetch(`https://geocode.search.hereapi.com/v1/geocode?q=${encodeURIComponent(addr)}&limit=1&apiKey=${API_KEY}`);
    const data=await res.json();
    if(data.items?.length)
      return [data.items[0].position.lat,data.items[0].position.lng];
  }catch{}
  return null;
}

// ===== DIST =====
const dist=(a,b)=>Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2);

// ===== OPTIMIZE =====
function optimize(points,addrs){
  let op=[points[0]],oa=[addrs[0]];
  let rp=points.slice(1),ra=addrs.slice(1);

  while(rp.length){
    let last=op.at(-1),idx=0,min=dist(last,rp[0]);

    for(let i=1;i<rp.length;i++){
      let d=dist(last,rp[i]);
      if(d<min){min=d;idx=i;}
    }

    op.push(rp[idx]);
    oa.push(ra[idx]);
    rp.splice(idx,1);
    ra.splice(idx,1);
  }

  return {op,oa};
}

// ===== ROUTE =====
let routeGroup=null;
let markers=[];

async function drawRoute(points){

  if(routeGroup) map.removeObject(routeGroup);
  routeGroup=new H.map.Group();

  const origin=`${points[0][0]},${points[0][1]}`;
  const dest=`${points.at(-1)[0]},${points.at(-1)[1]}`;

  let via=points.slice(1,-1)
    .map(p=>`&via=${p[0]},${p[1]}`)
    .join("");

  const url=`https://router.hereapi.com/v8/routes?transportMode=car&origin=${origin}&destination=${dest}${via}&return=polyline,summary&apiKey=${API_KEY}`;

  const res=await fetch(url);
  const data=await res.json();

  let total=0;

  data.routes[0].sections.forEach(sec=>{
    const line=H.geo.LineString.fromFlexiblePolyline(sec.polyline);

    const poly=new H.map.Polyline(line,{
      style:{strokeColor:"#00AB9F",lineWidth:5}
    });

    routeGroup.addObject(poly);
    total+=sec.summary.length;
  });

  map.addObject(routeGroup);
  map.getViewModel().setLookAtData({bounds:routeGroup.getBoundingBox()});

  document.getElementById("info").innerText=
    "Tổng quãng đường (tương đối): "+(total/1000).toFixed(2)+" km";
}

// ===== BUILD =====
async function buildRoute(){

  markers.forEach(m=>map.removeObject(m));
  markers=[];

  let inputs=document.querySelectorAll(".point-input");
  let addrs=[];

  inputs.forEach(i=>i.value&&addrs.push(i.value));

  if(addrs.length<2) return alert("Nhập ít nhất 2 điểm");

  let points=[];

  for(let a of addrs){
    let p=await geocode(a);
    if(!p) return alert("Không tìm thấy "+a);
    points.push(p);
  }

  const {op,oa}=optimize(points,addrs);

  let html="<ol>";
  oa.forEach(a=>html+=`<li>${a}</li>`);
  html+="</ol>";

  const gWay=op.slice(1,-1).map(p=>`${p[0]},${p[1]}`).join('|');

  html+=`<a target="_blank"
  href="https://www.google.com/maps/dir/?api=1&origin=${op[0]}&destination=${op.at(-1)}&waypoints=${gWay}">
  📍 Mở Google Maps</a>`;

  document.getElementById("suggestion").innerHTML=html;

  op.forEach((p,i)=>{
    const icon=new H.map.DomIcon(`
      <div style="
        background:${i===0?'#00AB9F':'#ff4d4f'};
        color:white;
        width:28px;height:28px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-weight:bold">
        ${i===0?'S':i}
      </div>`);

    const m=new H.map.DomMarker({lat:p[0],lng:p[1]},{icon});
    map.addObject(m);
    markers.push(m);
  });

  await drawRoute(op);
}

</script>

</body>
</html>
