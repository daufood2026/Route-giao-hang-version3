<!DOCTYPE html>
<html>
<head>
  <title>Route giao hàng v3 </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: 'Segoe UI'; margin: 20px; }
    .container { display: flex; gap: 20px; }
    .left { flex: 0.8; }
    .right {
      flex: 1.2;
      border: 1px solid #ddd;
      padding: 15px;
      background: #f9f9f9;
    }
    #map { height: 500px; background: #e5e5e5; }
    .input-row { display: flex; gap: 5px; margin-bottom: 8px; }
    input { flex: 1; padding: 8px; }
    button { padding: 8px 12px; cursor: pointer; }

    .watermark {
  position: fixed;
  top: 10px;
  right: 15px;
  font-size: 14px;
  font-weight: bold;
  color: #666;
  background: rgba(255,255,255,0.7);
  padding: 4px 10px;
  border-radius: 6px;
  z-index: 9999;
  pointer-events: none;
}
    
     </style>
</head>

<body>
<div class="watermark">by Turtle - v3</div>  
<h3>🚚 Route giao hàng - version3</h3>

<div class="container">
  <div class="left">
    <div id="inputs"></div>
    <button onclick="addPoint()">+ Thêm điểm</button>
    <button onclick="buildRoute()">🚀 Vẽ route</button>
    <div id="info">Tổng quãng đường: 0 km</div>
  </div>

  <div class="right">
    <h4>📌 Lộ trình gợi ý</h4>
    <div id="suggestion">Chưa có</div>
  </div>
</div>

<div id="map"></div>

<script src="https://js.api.here.com/v3/3.1/mapsjs-core.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-service.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js"></script>
<script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js"></script>
<link rel="stylesheet" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />

<script>

// ===== API =====
const API_KEY = "VkhQNy-v_IW-P28JVNho3NYF4dasL4qGr9N-61082nY";

// ===== MAP =====
const platform = new H.service.Platform({ apikey: API_KEY });
const layers = platform.createDefaultLayers();

const map = new H.Map(
  document.getElementById('map'),
  layers.vector.normal.map,
  {
    zoom: 12,
    center: { lat: 21.0285, lng: 105.8542 }
  }
);

window.addEventListener('resize', () => map.getViewPort().resize());
new H.mapevents.Behavior(new H.mapevents.MapEvents(map));
H.ui.UI.createDefault(map, layers);

// ===== INPUT =====
let count = 0;
function addPoint() {
  count++;
  const div = document.createElement("div");
  div.className = "input-row";
  div.innerHTML = `
    <input placeholder="Điểm ${count}" class="point-input">
    ${count>2 ? '<button onclick="this.parentElement.remove()">❌</button>' : ''}
  `;
  document.getElementById("inputs").appendChild(div);
}
addPoint(); addPoint(); addPoint();

// ===== GEOCODE =====
async function geocode(addr) {

  const query = addr.includes("Hà Nội") ? addr : addr + ", Hà Nội";

  // HERE
  try {
    const res = await fetch(`https://geocode.search.hereapi.com/v1/geocode?q=${encodeURIComponent(query)}&limit=1&apiKey=${API_KEY}`);
    const data = await res.json();

    if (data.items && data.items.length) {
      return [data.items[0].position.lat, data.items[0].position.lng];
    }
  } catch {}

  // fallback OSM
  const osm = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
  const o = await osm.json();

  if (o.length) return [parseFloat(o[0].lat), parseFloat(o[0].lon)];

  return null;
}

// ===== DISTANCE =====
function dist(a,b){
  return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// ===== OPTIMIZE =====
function optimize(points, addrs){
  let op=[points[0]], oa=[addrs[0]];
  let rp=points.slice(1), ra=addrs.slice(1);

  while(rp.length){
    let last=op.at(-1);
    let idx=0, min=dist(last,rp[0]);

    for(let i=1;i<rp.length;i++){
      let d=dist(last,rp[i]);
      if(d<min){min=d;idx=i;}
    }

    op.push(rp[idx]);
    oa.push(ra[idx]);
    rp.splice(idx,1);
    ra.splice(idx,1);
  }
  return {op,oa};
}

// ===== ROUTE =====
let routeGroup=null;
let markers=[];

async function drawRoute(points){

  if(routeGroup) map.removeObject(routeGroup);
  routeGroup=new H.map.Group();

  const origin = `${points[0][0]},${points[0][1]}`;
  const dest = `${points.at(-1)[0]},${points.at(-1)[1]}`;

  let via = points.slice(1,-1)
    .map(p=>`&via=${p[0]},${p[1]}`)
    .join("");

  const url = `https://router.hereapi.com/v8/routes?transportMode=car&origin=${origin}&destination=${dest}${via}&return=polyline,summary&apiKey=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.routes) return alert("Không có route");

  let total=0;

  data.routes[0].sections.forEach(sec=>{
    if(!sec.polyline) return;

    const line = H.geo.LineString.fromFlexiblePolyline(sec.polyline);

    const poly = new H.map.Polyline(line,{
      style:{strokeColor:'blue',lineWidth:5}
    });

    routeGroup.addObject(poly);
    total += sec.summary.length;
  });

  map.addObject(routeGroup);
  map.getViewModel().setLookAtData({bounds:routeGroup.getBoundingBox()});

  document.getElementById("info").innerText =
    "Tổng quãng đường: "+(total/1000).toFixed(2)+" km";
}

// ===== BUILD =====
async function buildRoute(){

  markers.forEach(m=>map.removeObject(m));
  markers=[];

  let inputs=document.querySelectorAll(".point-input");
  let addrs=[];

  inputs.forEach(i=>{
    if(i.value) addrs.push(i.value);
  });

  if(addrs.length<2) return alert("Nhập ít nhất 2 điểm");

  let points=[];

  for(let a of addrs){
    let p=await geocode(a);
    if(!p) return alert("Không tìm thấy "+a);
    points.push(p);
  }

  const {op,oa}=optimize(points,addrs);

  // UI
  let html="<ol>";
  oa.forEach(a=>html+=`<li>${a}</li>`);
  html+="</ol>";

  const gOrigin=`${op[0][0]},${op[0][1]}`;
  const gDest=`${op.at(-1)[0]},${op.at(-1)[1]}`;
  const gWay=op.slice(1,-1).map(p=>`${p[0]},${p[1]}`).join('|');

  html+=`<a href="https://www.google.com/maps/dir/?api=1&origin=${gOrigin}&destination=${gDest}&waypoints=${gWay}" target="_blank">Mở Google Maps</a>`;

  document.getElementById("suggestion").innerHTML=html;

  // marker
  op.forEach((p,i)=>{
    const icon=new H.map.DomIcon(`<div style="background:red;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center">${i+1}</div>`);
    const m=new H.map.DomMarker({lat:p[0],lng:p[1]},{icon});
    map.addObject(m);
    markers.push(m);
  });

  await drawRoute(op);
}

</script>

</body>
</html>
